name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          copilot-agent-and-mcp/package-lock.json
          copilot-agent-and-mcp/frontend/package-lock.json

    - name: Install root dependencies
      working-directory: copilot-agent-and-mcp
      run: npm ci

    - name: Install frontend dependencies
      working-directory: copilot-agent-and-mcp/frontend
      run: npm ci

    - name: Run backend tests
      working-directory: copilot-agent-and-mcp
      run: npm run test:backend

    - name: Build frontend
      working-directory: copilot-agent-and-mcp/frontend
      run: npm run build

    - name: Run E2E tests
      working-directory: copilot-agent-and-mcp
      run: npm run test:frontend